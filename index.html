<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary Meta -->
  <title>CU Marketplace — Student Exchange Platform</title>
  <meta name="description"
    content="CU Marketplace — Buy, sell, and barter second-hand items exclusively for Chandigarh University students." />
  <meta name="keywords"
    content="CU Marketplace, Chandigarh University, student marketplace, buy sell barter, second hand" />
  <meta name="author" content="CU Marketplace" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#c0392b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CU Market" />
  <meta name="application-name" content="CU Market" />
  <meta name="msapplication-TileColor" content="#c0392b" />

  <!-- Icons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Preload Splash Screen Image -->
  <link rel="preload" as="image" href="/Logo%20background.svg" type="image/svg+xml" />

  <!-- Web App Manifest -->
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CU Marketplace — Student Exchange Platform" />
  <meta property="og:description"
    content="Buy, sell, and barter second-hand items exclusively for Chandigarh University students." />
  <meta property="og:image" content="/android-chrome-512x512.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
